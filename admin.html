<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Paramount</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-body: #0b1221; --bg-card: #151d2e; --primary: #38bdf8; --text-main: #f1f5f9; --border: #334155; --danger: #ef4444; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; }
        .hidden { display: none !important; } /* FIX FOR YOUR GLITCH */
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        .auth-box { max-width: 400px; margin: 100px auto; background: var(--bg-card); padding: 40px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .input-group { margin-bottom: 15px; }
        .input-group input, select, textarea { width: 100%; padding: 10px; background: #0b1221; border: 1px solid var(--border); border-radius: 6px; color: #fff; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; margin-top:5px; width: 100%; }
        .btn-sm { width: auto; padding: 5px 10px; font-size: 0.8rem; }
        
        .header { background: var(--bg-card); padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .tabs { margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 5px; }
        .tab { padding: 8px 15px; background: #0b1221; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; color: #ccc; }
        .tab.active { background: var(--primary); color: #000; }
        
        .card { background: var(--bg-card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; border-bottom: 1px solid var(--border); text-align: left; font-size: 0.85rem; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="authScreen">
        <div class="auth-box">
            <img src="https://i.postimg.cc/281Ys5Fb/logos-png-removebg-preview.png" style="height:60px; margin-bottom:10px; border-radius:50%;" alt="Logo">
            <h2 style="margin-bottom: 20px; color: var(--primary);">Admin Login</h2>
            <div class="input-group"><input type="text" id="adminId" placeholder="Admin ID"></div>
            <div class="input-group"><input type="password" id="adminPass" placeholder="Password"></div>
            <button class="btn" onclick="login()">Login</button>
        </div>
    </div>

    <!-- DASHBOARD SCREEN (Initially Hidden) -->
    <div id="dashScreen" class="hidden">
        <div class="header">
            <h3 style="color: var(--primary);">Admin Panel</h3>
            <button class="btn btn-sm" style="width:auto; background:#333; color:#fff;" onclick="logout()">Logout</button>
        </div>
        <div class="container">
            <div class="tabs">
                <div class="tab active" onclick="showTab('sat')">Saturday Test</div>
                <div class="tab" onclick="showTab('sec')">Sectional</div>
                <div class="tab" onclick="showTab('students')">Students</div>
                <div class="tab" onclick="showTab('pdf')">PDF</div>
            </div>

            <!-- 7,8,9. SATURDAY TEST CONFIG -->
            <div id="satTab" class="card">
                <h3 style="margin-bottom:15px; color:var(--primary);">Saturday Test Settings</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group"><input type="text" id="satName" placeholder="Test Name"></div>
                    <div class="input-group"><input type="number" id="satDur" placeholder="Duration (Min)"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group"><input type="date" id="satDate"></div>
                    <div class="input-group"><input type="time" id="satTime"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <select id="satShift"><option>Morning</option><option>Afternoon</option><option>Evening</option></select>
                    </div>
                    <div class="input-group">
                        <select id="satBatch"><option>All</option><option>New Batch</option><option>Old Batch</option></select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Active: <input type="checkbox" id="satActive" style="width:auto;"></label>
                </div>
                <button class="btn" onclick="saveSat()">Save Settings</button>
                
                <hr style="margin:15px 0; border-color:var(--border);">
                <h4>Manage Questions</h4>
                <div class="input-group"><input type="file" id="satFile" accept=".csv"></div>
                <button class="btn" style="background:var(--primary);" onclick="uploadQ('saturday')">Upload CSV</button>
                <div id="satQList" style="margin-top:10px;"></div>
            </div>

            <!-- 4,6,10. SECTIONAL TESTS -->
            <div id="secTab" class="card hidden">
                <h3 style="margin-bottom:15px; color:var(--primary);">Create Sectional Test</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="input-group">
                        <select id="secSub"><option>Maths</option><option>Reasoning</option><option>GK</option><option>Science</option><option>English</option></select>
                    </div>
                    <div class="input-group"><input type="text" id="secName" placeholder="Test Name"></div>
                </div>
                <div class="input-group"><input type="number" id="secDur" placeholder="Duration (Min)"></div>
                <button class="btn" style="background:var(--primary);" onclick="createSec()">Create Test</button>

                <div id="secList" style="margin-top:20px;"></div>
            </div>

            <!-- 3. STUDENTS DATA -->
            <div id="studentsTab" class="card hidden">
                <h3 style="margin-bottom:15px; color:var(--primary);">Registered Students</h3>
                <table id="studTable"><thead><tr><th>Name</th><th>Email</th><th>Batch</th></tr></thead><tbody></tbody></table>
            </div>

            <!-- 5. PDF SECTION -->
            <div id="pdfTab" class="card hidden">
                <h3 style="margin-bottom:15px; color:var(--primary);">Upload PDFs</h3>
                <div class="input-group">
                    <select id="pdfSub"><option>Maths</option><option>Reasoning</option><option>GK</option><option>Science</option><option>English</option></select>
                </div>
                <div class="input-group"><input type="text" id="pdfTitle" placeholder="Title"></div>
                <div class="input-group"><input type="text" id="pdfUrl" placeholder="URL"></div>
                <button class="btn" onclick="upPdf()">Upload</button>
                <div id="pdfList" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPC07vEL3aeLf4jzV6hfxnvScglW6WGK0",
            authDomain: "paramount-academy-c236d.firebaseapp.com",
            databaseURL: "https://paramount-academy-c236d-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "paramount-academy-c236d",
            storageBucket: "paramount-academy-c236d.firebasestorage.app",
            messagingSenderId: "825327030964",
            appId: "1:825327030964:web:6a520db01d9ed9d549bde1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 2. LOGIN CREDENTIALS
        window.login = () => {
            const u = document.getElementById('adminId').value;
            const p = document.getElementById('adminPass').value;
            if(u === "paramount academy khandwa" && p === "Paramount@2016") {
                localStorage.setItem('isAdmin', 'true');
                showDash();
            } else alert("Wrong ID/Pass");
        };

        window.logout = () => { localStorage.clear(); location.reload(); };

        const showDash = () => {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('dashScreen').classList.remove('hidden');
            loadData();
        };

        window.showTab = (id) => {
            document.querySelectorAll('.card').forEach(e => e.classList.add('hidden'));
            document.getElementById(id+'Tab').classList.remove('hidden');
            document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
            event.target.classList.add('active');
        };

        // --- SATURDAY TEST ---
        window.saveSat = () => {
            const data = {
                name: document.getElementById('satName').value,
                duration: document.getElementById('satDur').value,
                date: document.getElementById('satDate').value,
                time: document.getElementById('satTime').value,
                shift: document.getElementById('satShift').value,
                batch: document.getElementById('satBatch').value,
                isActive: document.getElementById('satActive').checked
            };
            set(ref(db, 'settings/saturdayTest'), data);
            alert("Saved!");
        };

        // --- SECTIONAL ---
        window.createSec = () => {
            const sub = document.getElementById('secSub').value;
            const name = document.getElementById('secName').value;
            const dur = document.getElementById('secDur').value;
            if(!name || !dur) return alert("Fill all");
            const newRef = push(ref(db, `tests/${sub}`));
            set(newRef, { name, duration: dur, id: newRef.key });
            alert("Test Created! Upload CSV below.");
        };

        // --- CSV UPLOAD ---
        window.uploadQ = (testId) => {
            const file = document.getElementById(testId == 'saturday' ? 'satFile' : `file-${testId}`).files[0];
            if(!file) return alert("Choose file");
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const rows = e.target.result.split('\n');
                const path = testId == 'saturday' ? 'questions/saturday' : `questions/${testId}`;
                let count = 0;
                rows.forEach(r => {
                    if(!r.trim()) return;
                    const c = r.split(',');
                    if(c.length >= 8) {
                        push(ref(db, path), { text: c[2].trim(), op1: c[3].trim(), op2: c[4].trim(), op3: c[5].trim(), op4: c[6].trim(), ans: c[7].trim() });
                        count++;
                    }
                });
                alert(`${count} Uploaded!`);
            };
            reader.readAsText(file);
        };

        // --- DELETE QUESTION ---
        window.delQ = (path, key) => {
            if(confirm("Delete?")) remove(ref(db, `${path}/${key}`));
        };

        // --- LOAD DATA ---
        const loadData = () => {
            // Students
            const tbody = document.getElementById('studTable').getElementsByTagName('tbody')[0];
            onValue(ref(db, 'users'), (snap) => {
                tbody.innerHTML = '';
                snap.forEach(u => {
                    const d = u.val();
                    const tr = tbody.insertRow();
                    tr.innerHTML = `<td>${d.name}</td><td>${d.email}</td><td>${d.exam}</td>`;
                });
            });

            // Sectional List
            const secList = document.getElementById('secList');
            onValue(ref(db, 'tests'), (snap) => {
                secList.innerHTML = '<h4>Existing Tests</h4>';
                snap.forEach(sub => {
                    const subName = sub.key;
                    sub.forEach(t => {
                        const test = t.val();
                        const div = document.createElement('div');
                        div.style.cssText = "background:var(--bg-body); padding:10px; border-radius:5px; margin-top:10px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;";
                        div.innerHTML = `
                            <span><b>${subName}</b>: ${test.name} (${test.duration}m)</span>
                            <div style="display:flex; gap:5px; margin-top:5px;">
                                <input type='file' id='file-${test.id}' accept='.csv' style='font-size:0.7rem;'>
                                <button class='btn btn-sm' style="padding:2px 5px;" onclick="uploadQ('${test.id}')">Upload</button>
                            </div>
                        `;
                        secList.appendChild(div);
                        
                        // Load Questions List for this test
                        const qDiv = document.createElement('div');
                        qDiv.style.cssText = "width:100%; margin-top:5px;";
                        onValue(ref(db, `questions/${test.id}`), (qSnap) => {
                            qDiv.innerHTML = '';
                            if(qSnap.exists()) {
                                qSnap.forEach(q => {
                                    const d = q.val();
                                    const i = document.createElement('div');
                                    i.style.cssText = "font-size:0.8rem; border-bottom:1px solid #333; padding:2px; display:flex; justify-content:space-between;";
                                    i.innerHTML = `<span style="overflow:hidden; white-space:nowrap; width:90%;">${d.text}</span><button class='btn-sm' style="background:var(--danger); color:#fff; padding:0 5px; height:20px;" onclick="delQ('questions/${test.id}', '${q.key}')">X</button>`;
                                    qDiv.appendChild(i);
                                });
                            }
                        });
                        div.appendChild(qDiv);
                    });
                });
            });
            
            // Saturday Questions
             const satQList = document.getElementById('satQList');
             onValue(ref(db, 'questions/saturday'), (snap) => {
                satQList.innerHTML = '';
                if(snap.exists()) {
                    snap.forEach(q => {
                        const d = q.val();
                        const i = document.createElement('div');
                        i.style.cssText = "font-size:0.8rem; border-bottom:1px solid #333; padding:2px; display:flex; justify-content:space-between;";
                        i.innerHTML = `<span style="overflow:hidden; white-space:nowrap; width:90%;">${d.text}</span><button class='btn-sm' style="background:var(--danger); color:#fff; padding:0 5px; height:20px;" onclick="delQ('questions/saturday', '${q.key}')">X</button>`;
                        satQList.appendChild(i);
                    });
                }
             });
        };

        if(localStorage.getItem('isAdmin') === 'true') showDash();

    </script>
</body>
    </html>
